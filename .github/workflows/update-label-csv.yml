name: Update label CSV

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-label-csv
  cancel-in-progress: true

jobs:
  update-label-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download NetSuite CSV
        env:
          NETSUITE_LABELS_URL: ${{ secrets.NETSUITE_LABELS_URL }}
        run: |
          mkdir -p data

          curl -L --fail --silent --show-error --retry 3 --retry-delay 5 \
            "$NETSUITE_LABELS_URL" \
            -o data/labels.csv

          test -s data/labels.csv
          head -n 5 data/labels.csv

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet -- data/labels.csv; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git add data/labels.csv
          git commit -m "Update label CSV"
          git push
