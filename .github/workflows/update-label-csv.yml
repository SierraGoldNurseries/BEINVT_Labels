name: Update BEINVT CSV Files

on:
  workflow_dispatch:

  schedule:
    # Labels CSV every 30 minutes, offset to avoid busy GitHub top-of-hour queue.
    - cron: "7,37 * * * *"

    # Items CSV once daily.
    # GitHub cron is UTC. 06:59 UTC = 11:59 PM Pacific during daylight saving time.
    - cron: "59 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-beinvt-csv-files-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-csv-files:
    name: Update BEINVT CSV Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      LABELS_CSV_URL: ${{ secrets.NETSUITE_LABELS_CSV_URL }}
      ITEMS_CSV_URL: ${{ secrets.NETSUITE_ITEMS_CSV_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide which CSV files to update
        id: decide
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          SCHEDULE="${{ github.event.schedule }}"

          RUN_LABELS="false"
          RUN_ITEMS="false"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_LABELS="true"
            RUN_ITEMS="true"
          elif [ "$SCHEDULE" = "59 6 * * *" ]; then
            RUN_LABELS="false"
            RUN_ITEMS="true"
          else
            RUN_LABELS="true"
            RUN_ITEMS="false"
          fi

          echo "run_labels=$RUN_LABELS" >> "$GITHUB_OUTPUT"
          echo "run_items=$RUN_ITEMS" >> "$GITHUB_OUTPUT"

          echo "Run labels: $RUN_LABELS"
          echo "Run items:  $RUN_ITEMS"

      - name: Download selected NetSuite CSV files
        shell: bash
        run: |
          set -euo pipefail

          download_csv() {
            local url="$1"
            local out="$2"
            local label="$3"
            local tmp="${out}.tmp"

            if [ -z "$url" ]; then
              echo "::error::$label URL is empty. Add it as a GitHub secret."
              exit 1
            fi

            mkdir -p "$(dirname "$out")"

            echo "Downloading $label..."
            curl -L --fail --silent --show-error \
              --retry 3 \
              --retry-delay 10 \
              "$url" \
              -o "$tmp"

            if [ ! -s "$tmp" ]; then
              echo "::error::$label downloaded as an empty file."
              rm -f "$tmp"
              exit 1
            fi

            if head -c 500 "$tmp" | grep -qiE "<html|<!doctype|login|sign in"; then
              echo "::error::$label looks like HTML/login page, not CSV."
              echo "First 500 characters:"
              head -c 500 "$tmp" || true
              echo
              rm -f "$tmp"
              exit 1
            fi

            mv "$tmp" "$out"
            echo "Saved $label to $out"
          }

          if [ "${{ steps.decide.outputs.run_labels }}" = "true" ]; then
            download_csv "$LABELS_CSV_URL" "data/labels.csv" "BEINVT Labels CSV"
          fi

          if [ "${{ steps.decide.outputs.run_items }}" = "true" ]; then
            download_csv "$ITEMS_CSV_URL" "data/BEINVT - Items.csv" "BEINVT Items CSV"
          fi

      - name: Commit updated CSV files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/labels.csv "data/BEINVT - Items.csv" 2>/dev/null || true

          if [ -z "$(git status --porcelain -- data/labels.csv 'data/BEINVT - Items.csv')" ]; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git commit -m "Update BEINVT CSV files [skip ci]"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
